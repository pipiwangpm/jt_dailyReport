<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日报审查台</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --panel: #fff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
        --blue: #2563eb;
        --green: #168a57;
        --amber: #a16207;
        --red: #c2410c;
        --radius: 8px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button, input, select, textarea { font: inherit; }

      .app {
        max-width: 980px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 14px 12px 78px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      h1 { margin: 0; font-size: 21px; line-height: 1.25; }
      h2 { margin: 0 0 10px; font-size: 16px; }
      .subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }

      .section { display: none; }
      .section.active { display: grid; gap: 12px; }

      .panel, .item, .day {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }

      .panel { padding: 14px; }

      .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
      }

      .weekday {
        color: var(--muted);
        text-align: center;
        font-size: 12px;
      }

      .day {
        min-height: 54px;
        padding: 7px 5px;
        display: grid;
        align-content: space-between;
        text-align: left;
        cursor: pointer;
      }

      .day.empty { visibility: hidden; }
      .day.selected { border-color: var(--blue); box-shadow: 0 0 0 2px #dbeafe inset; }
      .day.has-record { background: #eef8f2; }
      .day.has-report { background: #eef4ff; }
      .day.has-both { background: linear-gradient(135deg, #eef8f2 0 50%, #eef4ff 50%); }

      .day-number { font-weight: 700; font-size: 13px; }
      .day-meta { color: var(--muted); font-size: 11px; }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        margin-right: 4px;
        border: 1px solid var(--line);
        vertical-align: -1px;
      }

      .dot.record { background: #dff3e7; }
      .dot.report { background: #dbeafe; }
      .dot.both { background: linear-gradient(135deg, #dff3e7 0 50%, #dbeafe 50%); }

      .record-list, .report-list, .more-list {
        display: grid;
        gap: 8px;
      }

      .item {
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .item-title { font-weight: 650; line-height: 1.45; }

      .chips { display: flex; gap: 6px; flex-wrap: wrap; }
      .chip {
        display: inline-flex;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        background: #fff;
      }

      .done { background: #e9f8ef; border-color: #bce8cb; color: var(--green); }
      .todo { background: #fff7e6; border-color: #f4d08a; color: var(--amber); }
      .muted { color: var(--muted); }
      .small { font-size: 12px; }

      label {
        display: grid;
        gap: 6px;
        color: #374151;
        font-size: 13px;
      }

      input, select, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        padding: 10px;
      }

      textarea {
        min-height: 240px;
        line-height: 1.7;
        resize: vertical;
      }

      .form-grid {
        display: grid;
        gap: 8px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .btn {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        padding: 10px 12px;
        cursor: pointer;
      }

      .btn.primary { border-color: var(--blue); background: var(--blue); color: #fff; }
      .btn.full { grid-column: 1 / -1; }

      .status-line {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        margin-top: 8px;
      }
      .status-line.ok { color: var(--green); }
      .status-line.error { color: var(--red); }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10;
        background: rgba(255, 255, 255, 0.96);
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        padding: 8px 10px;
        gap: 8px;
      }

      .bottom-nav button {
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--muted);
        padding: 8px;
        cursor: pointer;
      }

      .bottom-nav button.active {
        background: #eef4ff;
        color: var(--blue);
        font-weight: 650;
      }

      @media (min-width: 760px) {
        .app { padding: 22px 18px 88px; }
        h1 { font-size: 24px; }
        .desktop-grid {
          display: grid;
          grid-template-columns: minmax(0, 0.95fr) minmax(360px, 1.05fr);
          gap: 12px;
          align-items: start;
        }
        .bottom-nav {
          left: 50%;
          transform: translateX(-50%);
          max-width: 980px;
          border: 1px solid var(--line);
          border-bottom: 0;
          border-radius: 12px 12px 0 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="topbar">
        <div>
          <h1 id="page-title">记录日历</h1>
          <div id="page-subtitle" class="subtitle">输入来自本对话或钉钉，这里只负责查看和修正。</div>
        </div>
        <span class="chip done" id="selected-date-chip"></span>
      </div>

      <section class="section active" id="records">
        <div class="desktop-grid">
          <div class="panel">
            <div class="calendar-head">
              <button class="btn" id="record-prev-month" type="button">上月</button>
              <strong id="record-month-label"></strong>
              <button class="btn" id="record-next-month" type="button">下月</button>
            </div>
            <div class="calendar-grid" id="record-calendar"></div>
            <div class="legend">
              <span><i class="dot record"></i>有记录</span>
              <span><i class="dot report"></i>有报告</span>
              <span><i class="dot both"></i>两者都有</span>
            </div>
          </div>

          <div class="panel">
            <h2 id="record-list-title">当天记录</h2>
            <div class="record-list" id="record-list"></div>
          </div>
        </div>

        <div class="panel">
          <h2>修改记录</h2>
          <div class="form-grid">
            <label>选择记录<select id="edit-record-id"></select></label>
            <label>事项标题<input id="edit-title" /></label>
            <label>项目<input id="edit-project" /></label>
            <label>日期<input id="edit-date" type="date" /></label>
            <label>状态<select id="edit-status"><option>已完成</option><option>待办</option></select></label>
            <label>纳入日报<select id="edit-include"><option value="true">是</option><option value="false">否</option></select></label>
          </div>
          <div class="actions">
            <button class="btn primary full" id="save-record" type="button">保存修改</button>
          </div>
          <div class="status-line" id="record-status"></div>
        </div>
      </section>

      <section class="section" id="reports">
        <div class="desktop-grid">
          <div class="panel">
            <div class="calendar-head">
              <button class="btn" id="report-prev-month" type="button">上月</button>
              <strong id="report-month-label"></strong>
              <button class="btn" id="report-next-month" type="button">下月</button>
            </div>
            <div class="calendar-grid" id="report-calendar"></div>
            <div class="legend">
              <span><i class="dot record"></i>有记录</span>
              <span><i class="dot report"></i>有报告</span>
              <span><i class="dot both"></i>两者都有</span>
            </div>
          </div>

          <div class="panel">
            <h2>日报审查</h2>
            <div class="form-grid">
              <label>报告日期<input id="report-date" type="date" /></label>
              <label>关键问题<input id="risk-issue" placeholder="没有就留空" /></label>
              <label>需协调<input id="risk-coordination" placeholder="默认：暂无" /></label>
              <label>历史报告<select id="report-history"></select></label>
              <label>报告内容<textarea id="report-preview"></textarea></label>
            </div>
            <div class="actions">
              <button class="btn primary" id="build-report" type="button">生成/更新</button>
              <button class="btn" id="copy-report" type="button">复制</button>
              <button class="btn full" id="send-dingtalk" type="button">发送到钉钉</button>
            </div>
            <div class="status-line" id="send-status"></div>
          </div>
        </div>
      </section>

      <section class="section" id="more">
        <div class="panel">
          <h2>当前流程</h2>
          <div class="record-list">
            <div class="item"><div class="item-title">1. 输入</div><div class="muted small">你在本对话或钉钉里输入内容，页面不再承担输入入口。</div></div>
            <div class="item"><div class="item-title">2. 归集</div><div class="muted small">后端按项目知识库归集为完成项或待办项，并保存日期。</div></div>
            <div class="item"><div class="item-title">3. 审查</div><div class="muted small">在记录日历和日报日历中按天检查、修正、生成报告。</div></div>
            <div class="item"><div class="item-title">4. 发送</div><div class="muted small">人工确认后发送到指定钉钉群。</div></div>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="active" data-target="records" type="button">记录</button>
      <button data-target="reports" type="button">日报</button>
      <button data-target="more" type="button">更多</button>
    </nav>

    <script>
      let records = [];
      let reports = [];
      let recordSummary = {};
      let reportSummary = {};
      let selectedDate = todayText();
      let recordMonth = selectedDate.slice(0, 7);
      let reportMonth = selectedDate.slice(0, 7);
      let apiAvailable = location.protocol !== "file:";

      const titles = {
        records: ["记录日历", "输入来自本对话或钉钉，这里只负责查看和修正。"],
        reports: ["日报日历", "按日期查看历史日报，生成后人工审查再发送。"],
        more: ["流程说明", "先跑通输入、归集、审查、发送这条主流程。"],
      };

      function todayText() {
        const date = new Date();
        const offset = date.getTime() + 8 * 60 * 60 * 1000;
        return new Date(offset).toISOString().slice(0, 10);
      }

      function addDays(dateText, days) {
        const [year, month, day] = dateText.split("-").map(Number);
        const date = new Date(Date.UTC(year, month - 1, day));
        date.setUTCDate(date.getUTCDate() + days);
        return [
          date.getUTCFullYear(),
          String(date.getUTCMonth() + 1).padStart(2, "0"),
          String(date.getUTCDate()).padStart(2, "0"),
        ].join("-");
      }

      function monthShift(monthText, offset) {
        const [year, month] = monthText.split("-").map(Number);
        const date = new Date(Date.UTC(year, month - 1 + offset, 1));
        return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}`;
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        if (!response.ok) throw new Error(`请求失败：${response.status}`);
        return response.json();
      }

      function statusClass(status) {
        return status === "待办" ? "todo" : "done";
      }

      function show(target) {
        document.querySelectorAll(".section").forEach((section) => section.classList.toggle("active", section.id === target));
        document.querySelectorAll(".bottom-nav button").forEach((button) => button.classList.toggle("active", button.dataset.target === target));
        document.getElementById("page-title").textContent = titles[target][0];
        document.getElementById("page-subtitle").textContent = titles[target][1];
      }

      async function loadData() {
        if (!apiAvailable) return;
        const [recordData, recordSummaryData, reportData, reportSummaryData] = await Promise.all([
          api("/api/records"),
          api("/api/records/summary"),
          api("/api/reports"),
          api("/api/reports/summary"),
        ]);
        records = recordData.records || [];
        recordSummary = recordSummaryData.summary || {};
        reports = reportData.reports || [];
        reportSummary = reportSummaryData.summary || {};
      }

      function dayClass(date) {
        const hasRecord = Boolean(recordSummary[date]);
        const hasReport = Boolean(reportSummary[date]);
        if (hasRecord && hasReport) return "has-both";
        if (hasRecord) return "has-record";
        if (hasReport) return "has-report";
        return "";
      }

      function renderCalendar(target, monthText) {
        const container = document.getElementById(`${target}-calendar`);
        const label = document.getElementById(`${target}-month-label`);
        const [year, month] = monthText.split("-").map(Number);
        const first = new Date(Date.UTC(year, month - 1, 1));
        const daysInMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
        const leading = first.getUTCDay();
        label.textContent = `${year}年${String(month).padStart(2, "0")}月`;

        const cells = ["日", "一", "二", "三", "四", "五", "六"].map((day) => `<div class="weekday">${day}</div>`);
        for (let i = 0; i < leading; i += 1) cells.push('<button class="day empty" type="button"></button>');
        for (let day = 1; day <= daysInMonth; day += 1) {
          const date = `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
          const recordMeta = recordSummary[date];
          const reportMeta = reportSummary[date];
          const meta = [recordMeta ? `${recordMeta.total}记` : "", reportMeta ? `${reportMeta.total}报` : ""].filter(Boolean).join(" / ");
          cells.push(`
            <button class="day ${dayClass(date)} ${date === selectedDate ? "selected" : ""}" data-date="${date}" type="button">
              <span class="day-number">${day}</span>
              <span class="day-meta">${meta}</span>
            </button>
          `);
        }
        container.innerHTML = cells.join("");
        container.querySelectorAll("[data-date]").forEach((button) => {
          button.addEventListener("click", () => selectDate(button.dataset.date));
        });
      }

      function selectDate(date) {
        selectedDate = date;
        document.getElementById("selected-date-chip").textContent = date;
        document.getElementById("report-date").value = date;
        renderAll();
      }

      function recordsForSelectedDate() {
        return records.filter((item) => item.date === selectedDate);
      }

      function renderRecordList() {
        const list = recordsForSelectedDate();
        document.getElementById("record-list-title").textContent = `${selectedDate} 记录`;
        const container = document.getElementById("record-list");
        if (!list.length) {
          container.innerHTML = '<div class="item"><div class="muted small">当天暂无记录。</div></div>';
          renderEditOptions();
          return;
        }
        container.innerHTML = list.map((item) => `
          <button class="item" data-edit-id="${escapeHtml(item.id)}" type="button">
            <div class="item-title">${escapeHtml(item.title)}</div>
            <div class="chips">
              <span class="chip ${statusClass(item.status)}">${escapeHtml(item.status)}</span>
              <span class="chip">${escapeHtml(item.project)}</span>
              <span class="chip">${item.includeInReport === false ? "不纳入日报" : "纳入日报"}</span>
            </div>
          </button>
        `).join("");
        container.querySelectorAll("[data-edit-id]").forEach((button) => {
          button.addEventListener("click", () => {
            document.getElementById("edit-record-id").value = button.dataset.editId;
            fillEditForm();
          });
        });
        renderEditOptions();
      }

      function renderEditOptions() {
        const select = document.getElementById("edit-record-id");
        const list = recordsForSelectedDate();
        select.innerHTML = list.length
          ? list.map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.title)}</option>`).join("")
          : '<option value="">无可修改记录</option>';
        fillEditForm();
      }

      function fillEditForm() {
        const id = document.getElementById("edit-record-id").value;
        const item = records.find((record) => record.id === id);
        document.getElementById("edit-title").value = item ? item.title : "";
        document.getElementById("edit-project").value = item ? item.project : "";
        document.getElementById("edit-date").value = item ? item.date : selectedDate;
        document.getElementById("edit-status").value = item ? item.status : "已完成";
        document.getElementById("edit-include").value = item && item.includeInReport === false ? "false" : "true";
      }

      function renderReportHistory() {
        const select = document.getElementById("report-history");
        const list = reports.filter((item) => item.date === selectedDate);
        select.innerHTML = list.length
          ? list.map((item) => `<option value="${escapeHtml(item.id)}">${item.type === "daily" ? "日报" : item.type} - ${escapeHtml(item.updatedAt || "")}</option>`).join("")
          : '<option value="">暂无历史报告</option>';
        if (list.length) document.getElementById("report-preview").value = list[list.length - 1].content || "";
      }

      function renderAll() {
        renderCalendar("record", recordMonth);
        renderCalendar("report", reportMonth);
        renderRecordList();
        renderReportHistory();
      }

      function riskPayload() {
        return {
          keyIssue: document.getElementById("risk-issue").value.trim(),
          coordination: document.getElementById("risk-coordination").value.trim() || "暂无",
        };
      }

      document.querySelectorAll("[data-target]").forEach((button) => {
        button.addEventListener("click", () => show(button.dataset.target));
      });

      document.getElementById("record-prev-month").addEventListener("click", () => { recordMonth = monthShift(recordMonth, -1); renderCalendar("record", recordMonth); });
      document.getElementById("record-next-month").addEventListener("click", () => { recordMonth = monthShift(recordMonth, 1); renderCalendar("record", recordMonth); });
      document.getElementById("report-prev-month").addEventListener("click", () => { reportMonth = monthShift(reportMonth, -1); renderCalendar("report", reportMonth); });
      document.getElementById("report-next-month").addEventListener("click", () => { reportMonth = monthShift(reportMonth, 1); renderCalendar("report", reportMonth); });
      document.getElementById("report-date").addEventListener("change", (event) => selectDate(event.target.value));
      document.getElementById("edit-record-id").addEventListener("change", fillEditForm);
      document.getElementById("report-history").addEventListener("change", (event) => {
        const item = reports.find((report) => report.id === event.target.value);
        if (item) document.getElementById("report-preview").value = item.content || "";
      });

      document.getElementById("save-record").addEventListener("click", async () => {
        const id = document.getElementById("edit-record-id").value;
        const status = document.getElementById("record-status");
        if (!id) return;
        try {
          const data = await api(`/api/records/${encodeURIComponent(id)}`, {
            method: "PUT",
            body: JSON.stringify({
              title: document.getElementById("edit-title").value.trim(),
              project: document.getElementById("edit-project").value.trim(),
              date: document.getElementById("edit-date").value,
              status: document.getElementById("edit-status").value,
              includeInReport: document.getElementById("edit-include").value === "true",
            }),
          });
          records = data.records || records;
          selectedDate = document.getElementById("edit-date").value || selectedDate;
          const summaryData = await api("/api/records/summary");
          recordSummary = summaryData.summary || {};
          status.textContent = "已保存修改。";
          status.className = "status-line ok";
          renderAll();
        } catch (error) {
          status.textContent = error.message || "保存失败。";
          status.className = "status-line error";
        }
      });

      document.getElementById("build-report").addEventListener("click", async () => {
        const status = document.getElementById("send-status");
        try {
          const data = await api("/api/report", {
            method: "POST",
            body: JSON.stringify({ type: "daily", date: selectedDate, risk: riskPayload() }),
          });
          document.getElementById("report-preview").value = data.report || "";
          const reportData = await api("/api/reports");
          const reportSummaryData = await api("/api/reports/summary");
          reports = reportData.reports || [];
          reportSummary = reportSummaryData.summary || {};
          status.textContent = "报告已生成并保存为历史草稿。";
          status.className = "status-line ok";
          renderAll();
        } catch (error) {
          status.textContent = error.message || "生成失败。";
          status.className = "status-line error";
        }
      });

      document.getElementById("copy-report").addEventListener("click", async () => {
        const text = document.getElementById("report-preview").value;
        try {
          await navigator.clipboard.writeText(text);
          alert("报告已复制");
        } catch {
          alert("当前浏览器不允许自动复制，请手动选择报告文本复制");
        }
      });

      document.getElementById("send-dingtalk").addEventListener("click", async () => {
        const status = document.getElementById("send-status");
        const report = document.getElementById("report-preview").value.trim();
        if (!report) {
          status.textContent = "请先生成或选择历史报告。";
          status.className = "status-line error";
          return;
        }
        try {
          const data = await api("/api/dingtalk/send-report", {
            method: "POST",
            body: JSON.stringify({ title: "工作日报", report, type: "daily", date: selectedDate }),
          });
          status.textContent = data.ok ? "已发送到钉钉。" : "钉钉返回异常，请检查配置。";
          status.className = `status-line ${data.ok ? "ok" : "error"}`;
          await loadData();
          renderAll();
        } catch (error) {
          status.textContent = error.message || "发送失败。";
          status.className = "status-line error";
        }
      });

      async function init() {
        document.getElementById("selected-date-chip").textContent = selectedDate;
        document.getElementById("report-date").value = selectedDate;
        await loadData();
        renderAll();
      }

      init();
    </script>
  </body>
